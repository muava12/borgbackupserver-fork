name: Build ARM64 Docker Image

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/borgbackupserver
  NTFY_TOPIC: https://ntfy.sh/deploy-on-github-xasr6KBz47PjswPf53A78Fib

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Notify build started
        run: |
          curl -s -d "🔨 ARM64 Docker build started
          Repo: ${{ github.repository }}
          Ref: ${{ github.ref_name }}
          Trigger: ${{ github.event_name }}" \
            -H "Title: Build Started" \
            -H "Tags: hammer,docker" \
            -H "Priority: default" \
            "${{ env.NTFY_TOPIC }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine Docker tags
        id: tags
        run: |
          TAGS="${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}-arm64"
          if [ "${{ steps.version.outputs.is_release }}" = "true" ]; then
            TAGS="${TAGS},${{ env.GHCR_IMAGE }}:${{ github.ref_name }}-arm64"
            if [ "${{ github.event.release.prerelease }}" != "true" ]; then
              TAGS="${TAGS},${{ env.GHCR_IMAGE }}:latest-arm64"
            fi
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push ARM64 Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,scope=arm64,mode=max

      - name: Notify build success
        if: success()
        run: |
          curl -s -d "✅ ARM64 Docker build succeeded!
          Version: ${{ steps.version.outputs.version }}
          Tags: ${{ steps.tags.outputs.tags }}" \
            -H "Title: Build Succeeded" \
            -H "Tags: white_check_mark,docker" \
            -H "Priority: default" \
            "${{ env.NTFY_TOPIC }}"

      - name: Notify build failure
        if: failure()
        run: |
          curl -s -d "❌ ARM64 Docker build failed!
          Repo: ${{ github.repository }}
          Ref: ${{ github.ref_name }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -H "Title: Build Failed" \
            -H "Tags: x,docker" \
            -H "Priority: high" \
            "${{ env.NTFY_TOPIC }}"
