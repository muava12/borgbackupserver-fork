name: Build ARM64 Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  IMAGE_NAME: marcpope/borgbackupserver
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/borgbackupserver

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine Docker tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-arm64"
          TAGS="${TAGS},${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}-arm64"
          if [ "${{ steps.version.outputs.is_release }}" = "true" ]; then
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64"
            TAGS="${TAGS},${{ env.GHCR_IMAGE }}:${{ github.ref_name }}-arm64"
            if [ "${{ github.event.release.prerelease }}" != "true" ]; then
              TAGS="${TAGS},${{ env.IMAGE_NAME }}:latest-arm64"
              TAGS="${TAGS},${{ env.GHCR_IMAGE }}:latest-arm64"
            fi
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push ARM64 Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,scope=arm64,mode=max
