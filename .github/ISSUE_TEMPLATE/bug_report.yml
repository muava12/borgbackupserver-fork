name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: dropdown
    id: install-type
    attributes:
      label: Installation Type
      options:
        - Docker
        - Bare metal (Ubuntu)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: BBS Version
      description: Found in Settings or the footer
      placeholder: "e.g. 2.17.9"
    validations:
      required: true

  - type: input
    id: agent-version
    attributes:
      label: Agent Version (if applicable)
      description: Shown on the client detail page
      placeholder: "e.g. 2.17.9"

  - type: dropdown
    id: agent-os
    attributes:
      label: Agent OS (if applicable)
      options:
        - Ubuntu / Debian
        - CentOS / RHEL
        - Other Linux
        - Windows
        - macOS
        - N/A

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any error messages, server log entries, or agent output
      render: shell
